# Database Configuration
spring.application.name=backend
spring.datasource.url=jdbc:postgresql://localhost:5432/ride_sharing_db
spring.datasource.username=postgres
spring.datasource.password=Admin123
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=create-drop 
#spring.data.redis.url=${REDIS_URL}
spring.cache.type=none
spring.data.redis.repositories.enabled=false

# JWT Configuration
jwt.secret=mysecretkey123

#Admin Details
admin.email=admin@gmail.com
admin.password=admin123
admin.name=Admin

# Google Maps Configuration
google.maps.api.key=testkey

# Razorpay API Keys
razorpay.key.id=test
razorpay.key.secret=test

# --- EMAIL CONFIGURATION (Gmail) ---
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=test@gmail.com
spring.mail.password=test
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# Cloudinary Configuration
cloudinary.cloud_name=test
cloudinary.api_key=test
cloudinary.api_secret=test

# ---- ADMIN DEFAULTS ----
admin.default.phone=9999999999
admin.default.member-since=2024
admin.default.log-message=Admin initialized

# ---- JWT ----
jwt.expiration-ms=86400000
jwt.blacklist.prefix=jwt_blacklist
jwt.blacklist.value=revoked
jwt.auth.header=Authorization
jwt.bearer.prefix=Bearer

# ---- CORS ----
cors.allowed-origins=http://localhost:5173
cors.allowed-methods=GET,POST,PUT,DELETE
cors.allowed-headers=*
cors.allow-credentials=true

# ---- SECURITY ----
security.permit-all=/auth/**
security.admin-path=/admin/**
security.admin-authority=ADMIN
security.options-path=/**

# ---- WEBSOCKET ----
ws.broker.simple-prefixes=/topic,/queue
ws.app-destination-prefix=/app
ws.user-destination-prefix=/user
ws.endpoints=/ws
ws.allowed-origins=*
ws.chat.mapping=/chat
ws.chat.error-queue=/queue/errors
ws.chat.private-queue=/queue/private
ws.chat.topic-user-prefix=/topic/user

# ---- REDIS CACHE ----
redis.cache.ttl-hours=24
redis.cache.rides.ttl-seconds=${REDIS_CACHE_RIDES_TTL_SECONDS:60}
redis.cache.search-rides.ttl-seconds=${REDIS_CACHE_SEARCH_RIDES_TTL_SECONDS:60}

# ---- NOTIFICATIONS ----
notifications.unread.prefix=notifications
notifications.time-format=HH:mm
notifications.title.ride-update=Ride Update
notifications.title.booking-update=Booking Update

# ---- USER ----
app.frontend.url=http://localhost:5173
user.member-since.format=yyyy
user.reset-token.expiry-hours=2

# ---- EMAIL ----
email.charset=UTF-8 
email.subject.welcome=Welcome
email.template.welcome=welcome-template
email.subject.password-change=Password Changed
email.template.password-change=password-template
email.subject.new-booking-driver=New Booking
email.template.new-booking-driver=booking-template
email.subject.review-request=Review Request
email.template.review-request=review-template
email.subject.booking-confirm=Booking Confirmed
email.template.booking-confirm=confirm-template
email.subject.ride-cancel=Ride Cancelled
email.template.ride-cancel=cancel-template
email.subject.monthly-summary=Monthly Summary
email.template.monthly-summary=summary-template
email.subject.forgot-password=Reset Password
email.template.forgot-password=reset-template
email.subject.ride-reminder=Ride Reminder

# ---- SCHEDULER ----
scheduler.ride-reminder.fixed-rate-ms=60000
scheduler.ride-reminder.upcoming-hours=2
scheduler.monthly-summary.cron=0 0 0 1 * ?

# ---- PAYMENT ----
payment.gst-rate=0.18
payment.platform-fee-rate=0.10
payment.net-deduction-factor=0.9
payment.otp.length=6
payment.status.success=SUCCESS
payment.status.confirmed=CONFIRMED
payment.status.pending-approval=PENDING_APPROVAL
payment.status.pending-payment=PENDING_PAYMENT
payment.status.rejected=REJECTED
payment.status.cancelled=CANCELLED
payment.status.onboarded=ONBOARDED

# ---- RIDE PRICING ----
ride.base-fare=50
ride.rate-per-km=10
ride.rounding.step=5
ride.duration.label=mins
ride.status.available=AVAILABLE
ride.status.full=FULL
ride.status.in-progress=IN_PROGRESS
ride.status.completed=COMPLETED
ride.status.cancelled=CANCELLED
ride.status.cancelled-by-admin=CANCELLED_ADMIN
ride.status.cancelled-by-driver=CANCELLED_DRIVER

# ---- BOOKING ----
booking.message.arriving-soon=Driver arriving soon
booking.message.due-now=Payment due now

# ---- MOCK SERVICES ----
mock.distance.min=2
mock.distance.range=20
mock.order.prefix=ORD

# ---- RAZORPAY ----
razorpay.currency=INR
razorpay.receipt.prefix=RCPT
razorpay.provider=razorpay
mock.provider=mock
